<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexFit Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card top-left">Top Left</div>

    <div class="card top-center-left">Top Center Left</div>

    <div class="card top-center-right">Top Center Right</div>

    <div class="card top-right">Top Right</div>

    <div class="card middle-left">Middle Left</div>

    <div class="card middle-center">Middle Center (Logo)</div>

    <div class="card bottom-left">Bottom Left</div>

    <div class="card bottom-center-left">Bottom Center Left</div>

    <div class="card bottom-center-right">Bottom Center Right</div>

    <div class="card bottom-right">Bottom Right</div>

</div>

</body>
</html>
